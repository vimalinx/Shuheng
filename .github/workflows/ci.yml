name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check src tests scripts/check_policy_gates.py scripts/check_release_hygiene.py scripts/runtime_smoke.py scripts/wheel_smoke.py

      - name: Release hygiene
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/check_release_hygiene.py

      - name: Policy gates
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/check_policy_gates.py

      - name: Runtime smoke
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/runtime_smoke.py

      - name: Tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest -q -p no:cacheprovider

      - name: Compile
        run: python -m compileall -q src scripts

      - name: Build package
        run: python -m build --sdist --wheel --outdir /tmp/shuheng-dist

      - name: Wheel smoke
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/wheel_smoke.py --dist-dir /tmp/shuheng-dist
