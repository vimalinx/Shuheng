name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22.19.0"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools==77.0.3" wheel
          python -m pip install --no-build-isolation -e ".[dev]"

      - name: Pinned OMP runtime smoke
        run: python -m shuheng runtime setup-omp --json

      - name: Ruff check
        run: python -m ruff check src tests scripts/check_policy_gates.py scripts/check_release_hygiene.py scripts/dogfood_stdio_gateway.py scripts/release_scan_rules.py scripts/runtime_smoke.py scripts/wheel_smoke.py

      - name: Release hygiene
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/check_release_hygiene.py

      - name: Policy gates
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/check_policy_gates.py

      - name: Stdio gateway dogfood
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/dogfood_stdio_gateway.py

      - name: Runtime smoke
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/runtime_smoke.py

      - name: Tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest -q -p no:cacheprovider

      - name: Compile
        run: python -m compileall -q src scripts

      - name: Pi sidecar dependency and protocol smoke
        run: |
          npm ci --ignore-scripts --prefix integrations/pi-native-sidecar
          node --check integrations/pi-native-sidecar/sidecar.mjs
          printf '%s\n' '{"id":"ci-health","type":"health"}' \
            | node integrations/pi-native-sidecar/sidecar.mjs \
            | grep -q '"command":"health","success":true'

      - name: Build with minimum supported backend
        run: python -m build --no-isolation --sdist --wheel --outdir /tmp/shuheng-min-backend-dist

      - name: Build package
        run: python -m build --sdist --wheel --outdir /tmp/shuheng-dist

      - name: Wheel smoke
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/wheel_smoke.py --dist-dir /tmp/shuheng-dist

      - name: Diff cleanliness
        run: git diff --check
